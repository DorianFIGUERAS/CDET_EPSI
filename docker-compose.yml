services:
  # 1. FastAPI Backend
  backend:
    build:
      context: ./fastapi-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "5678:5678"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - ollama
      - kafka
    networks:
      - app-network

  # 2. Vite Frontend
  frontend:
    build:
      context: ./vite-project
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - app-network

  # 3. Ollama (AI Engine)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
      # Uncomment the line below if you have an NVIDIA GPU and want to use it
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - app-network

  # 4. Zookeeper (required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.8.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network

  # 5. Kafka
  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - app-network

  # 6. Kafka UI (AKHQ)
  kafka-ui:
    image: tchiotludo/akhq:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            docker:
              properties:
                bootstrap.servers: "kafka:9092"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  ollama_data:
